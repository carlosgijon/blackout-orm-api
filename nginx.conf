server {
    listen 80;
    server_name _;

    # ── Frontend Angular ──────────────────────────────────────────────────────
    root /var/www/app;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API NestJS (legacy) ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Increase for large logo uploads (base64 images)
        client_max_body_size 5M;
    }

    # ── API Spring Boot (migration) ───────────────────────────────────────────
    # Routes /spring-api/* to the Spring service during parallel-run migration.
    # Once migration is complete, swap /api/ → spring-api:3002 and remove NestJS.
    location /spring-api/ {
        rewrite            ^/spring-api/(.*) /$1 break;
        proxy_pass         http://spring-api:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 5M;
    }

    # ── Swagger UI (Spring) ───────────────────────────────────────────────────
    location /docs {
        proxy_pass         http://spring-api:3002/docs;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
    location /api-docs {
        proxy_pass         http://spring-api:3002/api-docs;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
}
