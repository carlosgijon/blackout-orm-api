server {
    listen 80;
    server_name _;

    # ── Frontend Angular ──────────────────────────────────────────────────────
    root /var/www/app;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Spring Boot ───────────────────────────────────────────────────────
    location /api/ {
        rewrite            ^/api/(.*) /$1 break;
        proxy_pass         http://spring-api:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 5M;
    }

    # ── Swagger UI (Spring) ───────────────────────────────────────────────────
    location /docs {
        proxy_pass         http://spring-api:3002/docs;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
    location /api-docs {
        proxy_pass         http://spring-api:3002/api-docs;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
}
