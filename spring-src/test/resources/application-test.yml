# ── Test profile — used by @SpringBootTest with Testcontainers ────────────────
# DataSource URL is overridden at runtime via @DynamicPropertySource in the test class.
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/test_placeholder
    username: test
    password: test

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    baseline-on-migrate: true
    baseline-version: 1

logging:
  level:
    com.blackout: INFO
    org.flywaydb: WARN
    org.testcontainers: WARN

jwt:
  secret: test-secret-for-integration-tests-min-32-chars-ok
  expiration-ms: 3600000

groq:
  api-key: ''

cors:
  allowed-origins: http://localhost:4200
