services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: blackout_orm
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d blackout_orm"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/blackout_orm
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3001
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # Port not exposed directly — only accessible through nginx

  spring-api:
    build:
      context: .
      dockerfile: Dockerfile.spring
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/blackout_orm
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://89.167.125.246}
      SERVER_PORT: 3002
      SPRING_APPLICATION_PORT: 3002
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app:/var/www/app:ro   # frontend build — copiar dist aquí
    depends_on:
      - spring-api
    restart: unless-stopped

volumes:
  postgres_data:
