name: Deploy backend to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/blackout-orm-api
            git fetch origin
            git reset --hard origin/main
            echo "── Commit en VPS: $(git rev-parse --short HEAD)"
            docker compose build --no-cache
            docker compose up -d
            echo "── Esperando arranque..."
            sleep 8
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/rehearsals)
            echo "── GET /api/rehearsals → HTTP $STATUS (esperado 401)"
            if [ "$STATUS" = "404" ]; then echo "ERROR: ruta no registrada" && exit 1; fi
            echo "✓ Backend deployed"
