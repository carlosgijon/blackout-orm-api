name: Deploy backend to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            # Preservar .env y build del frontend antes de reclonear
            [ -f ~/blackout-orm-api/.env ] && cp ~/blackout-orm-api/.env /tmp/blackout.env
            [ -d ~/blackout-orm-api/app ]  && cp -r ~/blackout-orm-api/app /tmp/blackout-app
            # Reclone limpio (elimina el problema de permisos en .git/objects)
            rm -rf ~/blackout-orm-api
            git clone https://github.com/carlosgijon/blackout-orm-api.git ~/blackout-orm-api
            cd ~/blackout-orm-api
            # Restaurar archivos de datos
            [ -f /tmp/blackout.env ]  && cp /tmp/blackout.env .env
            [ -d /tmp/blackout-app ]  && cp -r /tmp/blackout-app app
            echo "── Commit: $(git rev-parse --short HEAD)"
            docker compose build --no-cache
            docker compose up -d
            echo "── Esperando arranque..."
            sleep 10
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/rehearsals)
            echo "── GET /api/rehearsals → HTTP $STATUS (esperado 401)"
            if [ "$STATUS" = "404" ]; then echo "ERROR: ruta no registrada" && exit 1; fi
            echo "✓ Backend deployed"
