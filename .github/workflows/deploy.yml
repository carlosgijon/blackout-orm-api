name: Deploy backend to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/blackout-orm-api
            git pull
            docker compose up --build -d
            echo "→ Waiting for Spring to be healthy..."
            for i in $(seq 1 30); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3002/actuator/health)
              if [ "$STATUS" = "200" ]; then
                echo "→ Spring healthy, reloading nginx..."
                docker compose restart nginx
                echo "✓ Backend deployed"
                exit 0
              fi
              sleep 3
            done
            echo "✗ Spring did not become healthy in time"
            exit 1
