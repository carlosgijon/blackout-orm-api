name: Deploy backend to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            REPO="$HOME/blackout-orm-api"
            # Usar Docker (corre como root) para arreglar permisos del .git bloqueado por root
            docker run --rm -v "$REPO":/repo alpine chown -R $(id -u):$(id -g) /repo
            # Preservar .env y build del frontend
            [ -f "$REPO/.env" ] && cp "$REPO/.env" /tmp/blackout.env
            [ -d "$REPO/app"  ] && cp -r "$REPO/app" /tmp/blackout-app
            # Reclone limpio
            rm -rf "$REPO"
            git clone https://github.com/carlosgijon/blackout-orm-api.git "$REPO"
            cd "$REPO"
            # Restaurar archivos de datos
            [ -f /tmp/blackout.env ] && cp /tmp/blackout.env .env
            [ -d /tmp/blackout-app ] && cp -r /tmp/blackout-app app
            echo "── Commit: $(git rev-parse --short HEAD)"
            docker compose build --no-cache
            docker compose up -d
            echo "── Esperando arranque..."
            sleep 10
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/api/rehearsals)
            echo "── GET /api/rehearsals → HTTP $STATUS (esperado 401)"
            if [ "$STATUS" = "404" ]; then echo "ERROR: ruta no registrada" && exit 1; fi
            echo "✓ Backend deployed"
